<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact BrightCorp</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="site-header">
        <div class="logo">BrightCorp</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="contact-panel">
        <div class="contact-info">
            <span class="eyebrow">Get in touch</span>
            <h1>Send us a message</h1>
            <p>Have a project idea or need help with your website? Fill out the form and we'll reply quickly.</p>
            <div class="contact-details">
                <div><strong>Email</strong><span>hello@brightcorp.com</span></div>
                <div><strong>Phone</strong><span>+1 234 567 890</span></div>
                <div><strong>Office</strong><span>Karachi, Pakistan</span></div>
            </div>
        </div>
        <form id="contactForm" class="contact-form">
            <h2>Contact Form</h2>
            <label>Name</label>
            <input id="name" type="text" placeholder="Your name" required>
            <label>Email</label>
            <input id="email" type="email" placeholder="Your email" required>
            <label>Message</label>
            <textarea id="message" placeholder="Write your message" required></textarea>
            <button type="submit">Send Message</button>
            <p id="formStatus" class="form-status"></p>
        </form>
    </section>

   <script>
        const form = document.getElementById("contactForm")
        const statusText = document.getElementById("formStatus")

        form.addEventListener("submit", async function(e){
            e.preventDefault()

            statusText.textContent = "Sending message..."

            const data = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                message: document.getElementById("message").value
            }

            try {
                const res = await fetch("/contact", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                })

                const result = await res.json()

                statusText.textContent = result.message

                if (res.ok) {
                    form.reset()
                }

            } catch (err) {
                statusText.textContent = "There was a problem sending your message."
            }
        })
    </script>

</body>

</html>
